<p-toast position="bottom-center" class="max-w-62.5 md:max-w-full">
  <ng-template let-message #message>
    <div class="flex items-center">
      <div class="mr-1.5">
        @switch (message.severity) {
          @case ('success') {
            <i class="pi pi-check"></i>
          }

          @case ('error') {
            <i class="pi pi-exclamation-circle"></i>
          }

          @default {
            <div></div>
          }
        }
      </div>
      <div class="text-sm">
        {{ message.detail }}
      </div>
    </div>
  </ng-template>
</p-toast>
