@for (message of messages(); track message.id; let index = $index) {
  @if (message.groupDate !== messages()[index - 1]?.groupDate) {
    <div class="flex items-center">
      <div class="flex-auto border-b border-surface-200"></div>
      <div class="subtitle p-3">{{ message.groupDate }}</div>
      <div class="flex-auto border-b border-surface-200"></div>
    </div>
  }
  <div
    class="flex mb-3"
    [ngClass]="{
      'justify-end': message.isSender,
    }"
  >
    <div class="max-w-[70%]">
      <app-message-card [message]="message" />
    </div>
  </div>
  @if (
    message.user.id !== messages()[index + 1]?.user?.id ||
    message.groupDate !== messages()[index + 1]?.groupDate
  ) {
    <div class="flex" [class.justify-end]="message.isSender">
      <app-avatar [avatar]="message.user.avatar || ''" />
    </div>
  }
}
